{% load static %}
{% url 'index' as index %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}DocTrustAI{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
    <link rel="stylesheet" href="{% static 'doctrust/style.css' %}" />
  </head>
  <body>
   
    <nav class="navbar fixed-top navbar-glass" id="navbar">
      <div class="container-fluid px-4 px-lg-5 py-2 d-flex justify-content-between">
        
        <!-- Left: Brand -->
        <a href="{% url 'index' %}" class="brand-text d-flex align-items-center">
          <span class="text-muted fw-medium">DocTrust</span> <span class="fw-medium ps-1">AI</span>
        </a>

        {% if request.path != index %}
        <a href="{% url 'index' %}" class="link-dark link-offset-2 link-underline-opacity-0 link-underline-opacity-100-hover 
          d-flex align-items-center ms-auto home-link">
          Home
        </a>
        {% endif %}
      </div>
    </nav>
   
    <div class="container-fluid px-4 px-lg-5 mt-4">
      <!-- {% if messages %}
        <div class="row">
          <div class="col-12">
            {% for message in messages %}
              <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          </div>
        </div>
      {% endif %}
      -->


      {% block content %}{% endblock %}
    </div>
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
